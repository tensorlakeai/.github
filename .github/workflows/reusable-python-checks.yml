name: Reusable — Python Checks

# Runs black, isort, and pytest.
# Usage in your repo's workflow:
#
#   jobs:
#     python-checks:
#       uses: tensorlakeai/.github/.github/workflows/reusable-python-checks.yml@main
#       with:
#         python-version: "3.11"
#         working-directory: "."
#       secrets: inherit

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version to use"
        required: false
        type: string
        default: "3.11"
      working-directory:
        description: "Directory to run checks in"
        required: false
        type: string
        default: "."
      run-tests:
        description: "Whether to run pytest"
        required: false
        type: boolean
        default: true

jobs:
  python-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black isort
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e ".[dev]" 2>/dev/null || pip install -e . 2>/dev/null || true; fi

      - name: black
        run: black --check .

      - name: isort
        run: isort --check-only .

      - name: pytest
        if: inputs.run-tests
        run: python -m pytest
